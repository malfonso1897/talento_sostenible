{% extends "base.html" %}
{% block title %}Eliminar {{ contact.full_name }} - {{ crm_name }}{% endblock %}
{% block page_title %}Eliminar contacto{% endblock %}
{% block content %}
<div class="max-w-md">
    <div class="bg-white rounded-xl shadow-sm border p-6">
        <p class="text-gray-700 mb-4">¿Estás seguro de que quieres eliminar a <strong>{{ contact.full_name }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <div class="flex space-x-3">
                <button type="submit" class="btn-danger">Eliminar</button>
                <a href="{% url 'contacts:contact_detail' contact.pk %}" class="btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

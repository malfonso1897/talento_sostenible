<table class="w-full">
    <thead class="bg-gray-50">
        <tr>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nombre</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Empresa</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Teléfono</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Estado</th>
        </tr>
    </thead>
    <tbody class="divide-y">
        {% for contact in contacts %}
        <tr class="hover:bg-gray-50">
            <td class="px-4 py-3"><a href="{% url 'contacts:contact_detail' contact.pk %}" class="text-blue-600 hover:underline font-medium">{{ contact.full_name }}</a></td>
            <td class="px-4 py-3 text-sm text-gray-600">{{ contact.email }}</td>
            <td class="px-4 py-3 text-sm text-gray-600">{{ contact.company|default:"-" }}</td>
            <td class="px-4 py-3 text-sm text-gray-600">{{ contact.phone|default:"-" }}</td>
            <td class="px-4 py-3"><span class="badge {% if contact.status == 'active' %}bg-green-100 text-green-700{% elif contact.status == 'customer' %}bg-blue-100 text-blue-700{% else %}bg-gray-100 text-gray-700{% endif %}">{{ contact.get_status_display }}</span></td>
        </tr>
        {% empty %}
        <tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">No se encontraron contactos.</td></tr>
        {% endfor %}
    </tbody>
</table>

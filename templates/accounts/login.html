<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - {{ crm_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-gray-900">TALENTO SOSTENIBLE</h1>
                <p class="text-sm text-gray-500 mt-1">CRM Empresarial</p>
            </div>

            {% if form.errors %}
            <div class="bg-red-50 text-red-700 p-3 rounded-lg mb-4 text-sm">
                Usuario o contraseña incorrectos.
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="space-y-4">
                    <div>
                        <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
                        <input type="text" name="username" id="id_username" autofocus
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                        <input type="password" name="password" id="id_password"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <button type="submit" class="w-full py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium transition-colors">
                        Iniciar sesión
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

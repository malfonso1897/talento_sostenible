<table class="w-full">
    <thead class="bg-gray-50">
        <tr>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Asunto</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tipo</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Fecha</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Contacto</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Estado</th>
        </tr>
    </thead>
    <tbody class="divide-y">
        {% for act in activities %}
        <tr class="hover:bg-gray-50">
            <td class="px-4 py-3"><a href="{% url 'activities:activity_detail' act.pk %}" class="text-blue-600 hover:underline font-medium">{{ act.subject }}</a></td>
            <td class="px-4 py-3 text-sm">{{ act.get_activity_type_display }}</td>
            <td class="px-4 py-3 text-sm text-gray-600">{{ act.due_date|date:"d/m/Y H:i" }}</td>
            <td class="px-4 py-3 text-sm text-gray-600">{{ act.contact|default:"-" }}</td>
            <td class="px-4 py-3">{% if act.is_completed %}<span class="badge bg-green-100 text-green-700">Completada</span>{% else %}<span class="badge bg-yellow-100 text-yellow-700">Pendiente</span>{% endif %}</td>
        </tr>
        {% empty %}
        <tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">No hay actividades.</td></tr>
        {% endfor %}
    </tbody>
</table>

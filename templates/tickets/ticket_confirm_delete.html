{% extends "base.html" %}
{% block title %}Eliminar Ticket - {{ crm_name }}{% endblock %}
{% block content %}
<div class="max-w-md"><div class="bg-white rounded-xl shadow-sm border p-6">
    <p class="text-gray-700 mb-4">¿Eliminar el ticket <strong>{{ ticket.subject }}</strong>?</p>
    <form method="post">{% csrf_token %}<div class="flex space-x-3"><button type="submit" class="btn-danger">Eliminar</button><a href="{% url 'tickets:ticket_detail' ticket.pk %}" class="btn-secondary">Cancelar</a></div></form>
</div></div>
{% endblock %}

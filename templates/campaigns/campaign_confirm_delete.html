{% extends "base.html" %}
{% block title %}Eliminar Campaña - {{ crm_name }}{% endblock %}
{% block content %}
<div class="max-w-md"><div class="bg-white rounded-xl shadow-sm border p-6">
    <p class="text-gray-700 mb-4">¿Eliminar la campaña <strong>{{ campaign.name }}</strong>?</p>
    <form method="post">{% csrf_token %}<div class="flex space-x-3"><button type="submit" class="btn-danger">Eliminar</button><a href="{% url 'campaigns:campaign_detail' campaign.pk %}" class="btn-secondary">Cancelar</a></div></form>
</div></div>
{% endblock %}
